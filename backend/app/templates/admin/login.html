{% extends "admin/base.html" %}

{% block content %}
  <div class="hero">
    <div class="hero-logo-row">
      <img class="hero-logo" src="{{ url_for('media_file', filename='perfume-treasure-logo.png') }}" alt="Perfume Treasure logo" />
      <div class="eyebrow">PERFUME TREASURE</div>
    </div>
    <h1>Admin Login</h1>
    <p>Access your dashboard to oversee products, customers, orders, and everything powering Perfume Treasure.</p>
  </div>

  <div class="card" style="max-width: 460px; margin: 0 auto;">
    <form method="post" action="{{ url_for('admin.login_submit') }}">
      <div class="field">
        <label for="username">USERNAME</label>
        <input id="username" name="username" type="text" required />
      </div>
      <div class="field">
        <label for="password">PASSWORD</label>
        <input id="password" name="password" type="password" required />
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>
{% endblock %}
